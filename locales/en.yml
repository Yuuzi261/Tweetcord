notification:
  add:
    user_not_found: 'user {username} not found'
    client_conflict: 'user {username} already exists under {account_used}. No changes due to `auto_change_client` setting'
    failed: 'failed to add notifier, please try again later.'
    success_new: 'successfully added notifier for new user {username} to {account_used}!'
    success_update: 'successfully added/updated notifier for {username} (via {client_used})'
  remove:
    success: 'successfully remove notifier of {username}!'
    not_found: "can't find notifier {username} in <#{channel_id}>!"
    channel_not_found: "can't find channel <#{channel_id}> in {guild_name}!"
    failed: 'failed to remove notifier, please try again later.'
  customize:
    message:
      channel_not_found: "can't find channel {channel_id}!"
      notifier_not_found: "can't find notifier {username} in {channel_mention}!"
      success_default: 'successfully restored to default settings'
    translation:
      not_enabled: 'translation is not enabled in configs!'
      invalid_lang: 'invalid language code!'
      success_default: "successfully restored {username}'s translation setting to default ({default_lang})"
      success_set: "successfully set {username}'s translation language to {lang_code}!"
      user_not_found: "can't find twitter user {username} in this server!"

sync:
  background: 'synchronizing in the background'

list:
  title: 'Notification List in __***{guild_name}***__{page_counter}'
  title_page_counter: '  Page [{page}/{total}]'
  no_users: '***No users are registered on this server.***'
  footer: 'Page {page} of {total}'
  label_retweet: 'retweet'
  label_quote: 'quote'
  label_text: 'text'
  label_media: 'media'
  label_using: 'using'

modal:
  customize_message:
    title: 'customize message'
    label_full: 'customizing message for @{username} in #{channel_name}'
    label_short: 'customizing message for @{username}'
    label_fallback: 'customizing message'
    placeholder: 'enter customized message'
    success: 'setting successful'

display:
  action:
    tweeted: 'tweeted'
    retweeted: 'retweeted'
    quoted: 'quoted'
  tweet_type:
    photos: '{count} photos'
    media: 'a {media_type}'
    status: 'a status'
  media_type_map:
    photo: 'photo'
    video: 'video'
    gif: 'gif'
  button:
    view_video: 'View Video'
    view_original: 'View Original'

commands:
  add:
    description: 'Add something'
    notifier:
      description: 'Add a twitter user to specific channel on your server.'
      params:
        username: 'The username of the twitter user you want to turn on notifications for.'
        channel: 'The channel to which the bot delivers notifications.'
        mention: 'The role to mention when notifying.'
        type: 'Whether to enable notifications for retweets & quotes.'
        media_type: 'Whether to enable notifications for All Tweets, Tweets with Media, or Tweets without Media Only.'
        account_used: 'The account used to deliver notifications.'
      choices:
        enable_type:
          all_default: 'All (default)'
          retweet_only: 'Tweet & Retweet Only'
          quote_only: 'Tweet & Quote Only'
          tweet_only: 'Tweet Only'
        media_type:
          all_default: 'All (default)'
          no_media: 'No Media'
          media_only: 'Media Only'
  remove:
    description: 'Remove something'
    notifier:
      description: 'Remove a notifier on your server.'
      params:
        channel: 'The channel id which is set to delivers notifications.'
        username: 'The username of the twitter user you want to turn off notifications for.'
  customize:
    description: 'Customize something'
    message:
      description: 'Set customized messages for notification.'
      params:
        channel: 'The channel id which set to delivers notifications.'
        username: 'The username of the twitter user you want to set customized message.'
        default: 'Whether to use default setting.'
    translation:
      description: 'Set customized translation language for a tracked account.'
      params:
        username: 'The username of the tracked account you want to set customized translation language.'
        language: 'The language code you want to translate to (e.g. en, ja). Leave it empty to use default.'
  list:
    description: 'List something'
    users:
      description: 'Lists all exists notifier on your server.'
      params:
        account: 'The client name that you want to filter.'
        channel: 'The channel name that you want to filter.'
  sync:
    description: 'To sync the notification of new Twitter account with database, use this command.'

    success: '設定成功'

display:
  action:
    tweeted: '發推了'
    retweeted: '轉推了'
    quoted: '引用了'
  tweet_type:
    photos: '{count} 張圖片'
    media: '一則{media_type}'
    status: '一則推文'
  media_type_map:
    photo: '照片'
    video: '影片'
    gif: 'GIF'
  button:
    view_video: '查看影片'
    view_original: '查看原始網站'

commands:
  add:
    description: '新增項目'
    notifier:
      description: '新增 Twitter 使用者通知到伺服器的特定頻道。'
      params:
        username: '你想要開啟通知的Twitter用戶的用戶名'
        channel: '機器人發送通知的頻道'
        mention: '通知時提及的身分組'
        type: '設定是否啟用轉推和引用的通知'
        media_type: '設定是否啟用包含多媒體的通知，或僅啟用包含多媒體的通知'
        account_used: '用來追蹤用戶推文的Twitter客戶端'
      choices:
        enable_type:
          all_default: '全部（預設）'
          retweet_only: '僅推文與轉推'
          quote_only: '僅推文與引用'
          tweet_only: '僅推文'
        media_type:
          all_default: '全部（預設）'
          no_media: '無媒體'
          media_only: '僅含媒體'
  remove:
    description: '移除項目'
    notifier:
      description: '移除伺服器中的通知。'
      params:
        channel: '設置為發送通知的頻道'
        username: '你想要關閉通知的Twitter用戶的用戶名'
  customize:
    description: '自訂項目'
    settings:
      description: '自訂通知設定 (包含轉推、引用、媒體與訊息)。'
      params:
        channel: '機器人發送通知的頻道'
        username: '欲設定自定義通知訊息的Twitter用戶的用戶名'
    translation:
      description: '為追蹤帳號設定自訂翻譯語言。'
      params:
        username: '欲設定自定義翻譯語言的Twitter用戶的用戶名'
        language: '欲翻譯成的語言代碼（例如 en、ja），留空則使用預設值'
  list:
    description: '列出項目'
    users:
      description: '列出伺服器中所有的通知。'
      params:
        account: '你想要篩選的客戶端名稱（用來追蹤的帳號）'
        channel: '你想要篩選的頻道名稱'
  sync:
    description: '將新Twitter帳戶的通知與資料庫同步。如果你更改了bot使用的Twitter帳戶，請使用此指令'
